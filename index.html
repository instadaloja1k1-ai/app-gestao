<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b1219">
<meta name="description" content="Sistema de Gestão para Pequenos Negócios">
<title>GestãoPRO</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #0b1219;
    --surface:   #111c27;
    --surface2:  #162232;
    --border:    #1e3347;
    --accent:    #00d4aa;
    --accent2:   #f59e0b;
    --accent3:   #ef4444;
    --text:      #e8f0f7;
    --text2:     #7a9ab5;
    --text3:     #4a6a85;
    --radius:    12px;
    --radius-lg: 20px;
    --shadow:    0 8px 32px rgba(0,0,0,.45);
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }
  html { font-size: 15px; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100dvh; overflow-x: hidden; }
  input, select, textarea, button { font-family: var(--font-body); }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .hidden { display: none !important; }
  .fade-in { animation: fadeIn .35s ease; }
  @keyframes fadeIn  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  @keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
  @keyframes spin    { to { transform: rotate(360deg); } }
  @keyframes pulse   { 0%,100% { opacity:1; } 50% { opacity:.5; } }

  /* LOADER */
  #global-loader {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg); display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
  }
  #global-loader .spinner {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  #global-loader p { color: var(--text2); font-size: .9rem; }

  /* TOAST */
  #toast-container {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; gap: 8px; z-index: 9999; pointer-events: none;
  }
  .toast {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px; border-radius: 40px;
    font-size: .85rem; box-shadow: var(--shadow); animation: slideUp .3s ease; white-space: nowrap;
  }
  .toast.success { border-color: var(--accent); color: var(--accent); }
  .toast.error   { border-color: var(--accent3); color: var(--accent3); }

  /* LOGIN */
  #screen-login {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100dvh; padding: 24px;
    background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,212,170,.12) 0%, transparent 70%), var(--bg);
  }
  .login-card {
    width: 100%; max-width: 400px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 40px 32px;
    box-shadow: var(--shadow); animation: slideUp .45s ease;
  }
  .login-logo { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 32px; }
  .login-logo .logo-wrap {
    width: 80px; height: 80px; border-radius: 20px;
    background: var(--surface2); border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.2rem; overflow: hidden;
  }
  .login-logo .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .login-logo h1 { font-family: var(--font-head); font-size: 1.6rem; font-weight: 800; color: var(--text); letter-spacing: -.02em; text-align: center; }
  .login-logo .subtitle { font-size: .8rem; color: var(--text2); text-align: center; }

  /* FORMS */
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: .78rem; color: var(--text2); margin-bottom: 6px; letter-spacing: .04em; text-transform: uppercase; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 12px 16px; border-radius: var(--radius);
    font-size: .95rem; transition: border-color .2s, box-shadow .2s; outline: none;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,170,.12);
  }
  .form-group select option { background: var(--surface2); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 24px; border-radius: var(--radius); font-size: .9rem;
    font-weight: 600; cursor: pointer; border: none; transition: all .2s; letter-spacing: .01em;
  }
  .btn-primary  { background: var(--accent); color: #0b1219; box-shadow: 0 4px 20px rgba(0,212,170,.25); }
  .btn-primary:hover  { background: #00efc0; transform: translateY(-1px); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: rgba(239,68,68,.15); color: var(--accent3); border: 1px solid rgba(239,68,68,.3); }
  .btn-danger:hover { background: rgba(239,68,68,.25); }
  .btn-warn { background: rgba(245,158,11,.15); color: var(--accent2); border: 1px solid rgba(245,158,11,.3); }
  .btn-full { width: 100%; }
  .btn-sm { padding: 7px 14px; font-size: .8rem; }
  .btn-icon { padding: 9px; border-radius: 10px; }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }

  /* APP SHELL */
  #app-shell { display: flex; flex-direction: column; min-height: 100dvh; }
  #top-bar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(11,18,25,.92); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px; display: flex; align-items: center; gap: 12px;
  }
  #top-bar .logo-wrap { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  #top-bar .logo-wrap img { width: 36px; height: 36px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }
  #top-bar .logo-placeholder { width: 36px; height: 36px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
  #top-bar .company-name { font-family: var(--font-head); font-weight: 700; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #top-bar .operator-badge { font-size: .72rem; color: var(--text2); background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; white-space: nowrap; flex-shrink: 0; }

  /* BOTTOM NAV */
  #bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: rgba(11,18,25,.95); backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-around; padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 5px 8px; border-radius: var(--radius); cursor: pointer;
    font-size: .62rem; color: var(--text3); transition: all .2s; flex: 1;
    border: none; background: none;
  }
  .nav-item.active { color: var(--accent); }
  .nav-item .nav-icon { font-size: 1.25rem; line-height: 1; }

  /* MAIN */
  #main-content { flex: 1; padding: 16px 16px 90px; max-width: 700px; margin: 0 auto; width: 100%; }

  /* SECTION HEADER */
  .section-header { margin-bottom: 20px; }
  .section-header h2 { font-family: var(--font-head); font-size: 1.4rem; font-weight: 700; }
  .section-header p  { font-size: .85rem; color: var(--text2); margin-top: 4px; }

  /* LOCKED OVERLAY */
  .locked-overlay {
    background: rgba(11,18,25,.85); backdrop-filter: blur(8px);
    border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 32px; text-align: center; margin-bottom: 16px;
  }
  .locked-overlay .lock-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .locked-overlay p { color: var(--text2); font-size: .9rem; margin-bottom: 16px; }

  /* DASHBOARD */
  .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .dash-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 16px; position: relative; overflow: hidden; }
  .dash-card.full { grid-column: 1/-1; }
  .dash-card .card-label { font-size: .72rem; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .dash-card .card-value { font-family: var(--font-head); font-size: 1.4rem; font-weight: 700; }
  .dash-card .card-value.green  { color: var(--accent); }
  .dash-card .card-value.yellow { color: var(--accent2); }
  .dash-card .card-value.red    { color: var(--accent3); }
  .dash-card .card-sub { font-size: .75rem; color: var(--text3); margin-top: 4px; }
  .dash-card .blurred { filter: blur(6px); user-select: none; pointer-events: none; }

  .period-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .period-tab {
    padding: 6px 14px; border-radius: 20px; font-size: .8rem; cursor: pointer;
    border: 1px solid var(--border); background: transparent; color: var(--text2); transition: all .2s;
  }
  .period-tab.active { background: var(--accent); color: #0b1219; border-color: var(--accent); font-weight: 600; }

  .sales-list { display: flex; flex-direction: column; gap: 8px; }
  .sale-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .sale-item .sale-info .sale-name { font-weight: 500; font-size: .9rem; }
  .sale-item .sale-info .sale-date { font-size: .75rem; color: var(--text2); }
  .sale-item .sale-values { text-align: right; }
  .sale-item .sale-revenue { font-family: var(--font-head); font-weight: 700; color: var(--accent); }
  .sale-item .sale-profit  { font-size: .75rem; color: var(--text2); }

  /* CARDS LIST */
  .card-list { display: flex; flex-direction: column; gap: 10px; }
  .item-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 16px;
    display: flex; align-items: center; gap: 14px; transition: border-color .2s;
  }
  .item-card:hover { border-color: var(--accent); }
  .item-card .item-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; flex-shrink: 0;
  }
  .item-card .item-info { flex: 1; min-width: 0; }
  .item-card .item-name { font-weight: 600; font-size: .95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-card .item-meta { font-size: .78rem; color: var(--text2); margin-top: 2px; }
  .item-card .item-actions { display: flex; gap: 6px; flex-shrink: 0; }

  /* STOCK BADGE */
  .stock-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 20px; font-size: .75rem; font-weight: 600;
  }
  .stock-badge.ok      { background: rgba(0,212,170,.12); color: var(--accent); border: 1px solid rgba(0,212,170,.25); }
  .stock-badge.low     { background: rgba(245,158,11,.12); color: var(--accent2); border: 1px solid rgba(245,158,11,.25); }
  .stock-badge.zero    { background: rgba(239,68,68,.12); color: var(--accent3); border: 1px solid rgba(239,68,68,.25); }

  /* FAB */
  .fab {
    position: fixed; bottom: 80px; right: 20px; z-index: 200;
    width: 54px; height: 54px; border-radius: 16px;
    background: var(--accent); color: #0b1219;
    font-size: 1.6rem; border: none; cursor: pointer;
    box-shadow: 0 6px 24px rgba(0,212,170,.4);
    display: flex; align-items: center; justify-content: center; transition: all .2s;
  }
  .fab:hover { transform: scale(1.08); }
  .fab:active { transform: scale(.95); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,.75); backdrop-filter: blur(6px);
    display: flex; align-items: flex-end; justify-content: center;
    animation: fadeIn .2s ease;
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 24px 24px 0 0; padding: 28px 24px 40px;
    width: 100%; max-width: 500px; max-height: 90dvh; overflow-y: auto;
    animation: slideUp .3s ease;
  }
  .modal h3 { font-family: var(--font-head); font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; }
  .modal-footer { display: flex; gap: 10px; margin-top: 20px; }
  .modal-footer .btn { flex: 1; }

  /* SETTINGS */
  .settings-section { margin-bottom: 24px; }
  .settings-section h3 { font-family: var(--font-head); font-size: .85rem; font-weight: 700; margin-bottom: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: .08em; }
  .settings-row {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
  }

  /* AVATAR */
  .avatar-upload { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .avatar-preview {
    width: 72px; height: 72px; border-radius: 18px;
    background: var(--surface2); border: 2px dashed var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem; overflow: hidden; flex-shrink: 0; cursor: pointer; transition: border-color .2s;
  }
  .avatar-preview:hover { border-color: var(--accent); }
  .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }

  /* SALE */
  .sale-product-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .sale-product-row {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .sale-product-row .row-name { flex: 1; font-size: .88rem; font-weight: 500; }
  .sale-product-row .row-stock { font-size: .72rem; color: var(--text3); }
  .sale-product-row .row-qty { display: flex; align-items: center; gap: 8px; }
  .qty-btn {
    width: 28px; height: 28px; border-radius: 8px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all .15s;
  }
  .qty-btn:hover { border-color: var(--accent); color: var(--accent); }
  .qty-display { width: 32px; text-align: center; font-weight: 600; font-size: .9rem; }
  .sale-product-row .row-subtotal { font-family: var(--font-head); font-size: .88rem; font-weight: 700; color: var(--accent); min-width: 64px; text-align: right; }
  .sale-total-bar {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
  }
  .sale-total-bar .total-label { font-size: .85rem; color: var(--text2); }
  .sale-total-bar .total-value { font-family: var(--font-head); font-size: 1.4rem; font-weight: 800; color: var(--accent); }

  /* EMPTY */
  .empty-state { text-align: center; padding: 48px 24px; color: var(--text3); }
  .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: .5; }
  .empty-state p { font-size: .9rem; }

  /* OPERATOR BANNER */
  .operator-banner {
    background: linear-gradient(135deg, rgba(0,212,170,.08), rgba(0,212,170,.03));
    border: 1px solid rgba(0,212,170,.2);
    border-radius: var(--radius); padding: 12px 16px;
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
  }
  .operator-banner .op-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; flex-shrink: 0; }
  .operator-banner .op-text { font-size: .85rem; }
  .operator-banner .op-name { font-weight: 600; color: var(--accent); }

  /* MANAGER BADGE */
  .manager-active {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 20px; font-size: .78rem; font-weight: 600;
    background: rgba(245,158,11,.12); color: var(--accent2); border: 1px solid rgba(245,158,11,.25);
    margin-bottom: 12px;
  }

  @media (min-width: 480px) {
    .dash-grid { grid-template-columns: repeat(3, 1fr); }
    .dash-card.full { grid-column: 1/-1; }
  }
</style>
</head>
<body>

<!-- LOADER -->
<div id="global-loader">
  <div class="spinner"></div>
  <p>Carregando...</p>
</div>

<!-- LOGIN -->
<div id="screen-login" class="hidden">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-wrap" id="login-logo-wrap">🏪</div>
      <h1 id="login-company-name">GestãoPRO</h1>
      <span class="subtitle">Sistema de Gestão</span>
    </div>
    <div class="form-group">
      <label>Usuário</label>
      <input type="text" id="login-user" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="login-pass" placeholder="••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app-shell" class="hidden">
  <div id="top-bar">
    <div class="logo-wrap">
      <div id="topbar-logo-ph" class="logo-placeholder">🏪</div>
      <img id="topbar-logo" src="" alt="" style="display:none">
      <span id="topbar-company" class="company-name">GestãoPRO</span>
    </div>
    <span id="topbar-operator" class="operator-badge hidden"></span>
  </div>
  <div id="main-content"></div>
  <nav id="bottom-nav">
    <button class="nav-item active" data-screen="dashboard" onclick="navigate('dashboard')">
      <span class="nav-icon">📊</span>Dashboard
    </button>
    <button class="nav-item" data-screen="sales" onclick="navigate('sales')">
      <span class="nav-icon">🛒</span>Vendas
    </button>
    <button class="nav-item" data-screen="products" onclick="navigate('products')">
      <span class="nav-icon">📦</span>Produtos
    </button>
    <button class="nav-item" data-screen="clients" onclick="navigate('clients')">
      <span class="nav-icon">👥</span>Clientes
    </button>
    <button class="nav-item" data-screen="settings" onclick="navigate('settings')">
      <span class="nav-icon">⚙️</span>Config
    </button>
  </nav>
</div>

<div id="toast-container"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, addDoc, updateDoc, deleteDoc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCWoLAh6N_kdW0Cy-xjiFpeRx-YFIBZ90w",
  authDomain: "gestaopro-18341.firebaseapp.com",
  projectId: "gestaopro-18341",
  storageBucket: "gestaopro-18341.firebasestorage.app",
  messagingSenderId: "288233544118",
  appId: "1:288233544118:web:a7b040fe1e4a2633a20917"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── GLOBALS ──
let COMPANY_ID = null;
let SESSION = { managerUnlocked: false };
let state = { screen: 'dashboard', dashPeriod: 'today' };
let saleCart = {};

// ── HELPERS ──
function fmt(v) { return 'R$\u00a0' + Number(v||0).toLocaleString('pt-BR', { minimumFractionDigits:2, maximumFractionDigits:2 }); }
function fmtDate(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function toast(msg, type='') {
  const t = document.createElement('div');
  t.className = 'toast ' + type; t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(()=>t.remove(), 2800);
}
function showLoader(v) { document.getElementById('global-loader').style.display = v?'flex':'none'; }
function now() { return new Date(); }

function filterByPeriod(sales, period) {
  const n = now();
  let start;
  if (period==='today') { start=new Date(n); start.setHours(0,0,0,0); }
  else if (period==='week') { start=new Date(n); start.setDate(n.getDate()-n.getDay()); start.setHours(0,0,0,0); }
  else if (period==='15days') { start=new Date(n); start.setDate(n.getDate()<=15?1:16); start.setHours(0,0,0,0); }
  else if (period==='month') { start=new Date(n.getFullYear(),n.getMonth(),1); }
  else { start=new Date(n.getFullYear(),0,1); }
  return sales.filter(s => { const d=s.date?.toDate?s.date.toDate():new Date(s.date); return d>=start; });
}
function calcTotals(sales) {
  let revenue=0,cost=0;
  sales.forEach(s=>{ revenue+=s.revenue||0; cost+=s.cost||0; });
  return { revenue, cost, profit: revenue-cost };
}
function stockClass(qty, min) {
  if (qty <= 0) return 'zero';
  if (qty <= (min||5)) return 'low';
  return 'ok';
}
function stockLabel(qty, min) {
  if (qty <= 0) return '⛔ Sem estoque';
  if (qty <= (min||5)) return '⚠️ Estoque baixo';
  return '✓ Em estoque';
}

// ── LOGIN ──
window.doLogin = async () => {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!user||!pass) { toast('Preencha usuário e senha','error'); return; }
  showLoader(true);
  try {
    // Search companies collection for matching credentials
    const snap = await getDocs(collection(db,'companies'));
    let found = null;
    snap.forEach(d => {
      const data = d.data();
      if (data.user === user && data.pass === pass) { found = {id:d.id,...data}; }
    });
    if (!found) {
      // Create new company on first login
      if (snap.empty || user === 'admin') {
        // Check if admin company exists
        const existing = snap.docs.find(d=>d.data().user===user);
        if (!existing) {
          const ref = await addDoc(collection(db,'companies'), {
            name: 'Minha Empresa', logo: '', user, pass,
            operator: '', managerPass: '1234', createdAt: new Date()
          });
          COMPANY_ID = ref.id;
          localStorage.setItem('gp_session', COMPANY_ID);
          const data = await getCompanyData();
          showApp(data); showLoader(false); return;
        }
      }
      toast('Usuário ou senha incorretos','error'); showLoader(false); return;
    }
    COMPANY_ID = found.id;
    localStorage.setItem('gp_session', COMPANY_ID);
    showApp(found);
  } catch(e) { toast('Erro ao conectar: '+e.message,'error'); }
  showLoader(false);
};

function showApp(data) {
  document.getElementById('screen-login').classList.add('hidden');
  document.getElementById('app-shell').classList.remove('hidden');
  SESSION.managerUnlocked = false;
  refreshTopBar(data);
  navigate('dashboard');
}

function refreshTopBar(data) {
  if (!data) return;
  document.getElementById('topbar-company').textContent = data.name || 'GestãoPRO';
  if (data.logo) {
    document.getElementById('topbar-logo').src = data.logo;
    document.getElementById('topbar-logo').style.display = '';

function requireManager(callback) {
  if (SESSION.managerUnlocked) { callback(); return; }
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>🔐 Área Restrita</h3>
      <p style="font-size:.85rem;color:var(--text2);margin-bottom:16px">Esta área é protegida. Digite a senha do gerente para continuar.</p>

      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
        <button class="btn btn-primary" onclick="checkManagerPass()">Entrar</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });
  document.getElementById('mgr-pass-input').addEventListener('keydown', e=>{ if(e.key==='Enter') window.checkManagerPass(); });

  window.checkManagerPass = async () => {
    const input = document.getElementById('mgr-pass-input').value;
    const data = await getCompanyData();
    if (input === (data.managerPass || '1234')) {
      SESSION.managerUnlocked = true;
      overlay.remove();
      callback();
    } else { toast('Senha incorreta','error'); }
  };
}

async function salesScreen() {
  const mc = document.getElementById('main-content');
  const [products, clients] = await Promise.all([getColl('products'), getColl('clients')]);
  saleCart = {};

  function render() {
    let total=0, totalCost=0;
    Object.entries(saleCart).forEach(([id,qty])=>{
      const p=products.find(x=>x.id===id); if(!p) return;
      total+=p.price*qty; totalCost+=p.cost*qty;
    });

    mc.innerHTML = `
      <div class="section-header"><h2>Nova Venda</h2><p>Selecione produtos e finalize</p></div>
      <div class="form-group">
        <label>Cliente (opcional)</label>
        <select id="sale-client">
          <option value="">— Venda direta —</option>
          ${clients.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}
        </select>
      </div>
      ${products.length===0?`<div class="empty-state"><div class="empty-icon">📦</div><p>Cadastre produtos primeiro.</p></div>`:`
      <div class="sale-product-list">
        ${products.map(p=>{
          const qty=saleCart[p.id]||0;
          const stock=p.stock||0;
          const sc=stockClass(stock,p.minStock);
          const unit=p.unit==='kg'?'kg':p.unit==='lt'?'lt':'un';
          return `<div class="sale-product-row">
            <div style="flex:1;min-width:0">
              <div class="row-name">${p.name} <small style="color:var(--text3)">(${unit})</small></div>
              <div class="row-stock"><span class="stock-badge ${sc}">${stockLabel(stock,p.minStock)}</span> ${stock} em estoque</div>
            </div>
            <div class="row-qty">
              <button class="qty-btn" onclick="changeCart('${p.id}',-1)">−</button>
              <span class="qty-display">${qty}</span>
              <button class="qty-btn" onclick="changeCart('${p.id}',1)" ${qty>=stock?'disabled style="opacity:.3"':''}>+</button>
            </div>
            <div class="row-subtotal">${fmt(p.price*qty)}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="sale-total-bar">
        <span class="total-label">Total</span>
        <span class="total-value">${fmt(total)}</span>
      </div>
      <button class="btn btn-primary btn-full" onclick="finishSale(${total},${totalCost})" ${total===0?'disabled':''}>
        ✓ Finalizar Venda
      </button>`}`;
  }

  window.changeCart = (id, delta) => {
    const p = products.find(x=>x.id===id); if(!p) return;
    const cur = saleCart[id]||0;
    const nw = Math.max(0, Math.min(cur+delta, p.stock||0));
    saleCart[id] = nw;
    render();
  };

  window.finishSale = async (revenue, cost) => {
    if (revenue===0) return;
    showLoader(true);
    try {
      const clientSel = document.getElementById('sale-client');
      const clientId = clientSel?.value||'';
      const clients2 = await getColl('clients');
      const client = clients2.find(c=>c.id===clientId);
      // Deduce stock
      const updates = [];
      for (const [id,qty] of Object.entries(saleCart)) {
        if (qty>0) {
          const p=products.find(x=>x.id===id);
          if(p) updates.push(updateItem('products',id,{stock:Math.max(0,(p.stock||0)-qty)}));
        }
      }
      await Promise.all(updates);
      await addItem('sales',{ date:new Date(), revenue, cost, clientId, clientName:client?.name||'' });
      saleCart={};
      toast('Venda registrada!','success');
      // Reload products with new stock
      const fresh = await getColl('products');
      products.splice(0,products.length,...fresh);
      render();
    } catch(e){ toast('Erro: '+e.message,'error'); }
    showLoader(false);
  };

  render();
}

    if (editId) {
      await updateItem('clients',editId,{name,phone,email,notes});
      const i=cls.findIndex(x=>x.id===editId);
      if(i>-1) cls[i]={...cls[i],name,phone,email,notes};
    } else {
      const ref=await addItem('clients',{name,phone,email,notes,createdAt:new Date()});
      cls.push({id:ref.id,name,phone,email,notes});
    }
    overlay.remove();
    toast(editId?'Cliente atualizado!':'Cliente cadastrado!','success');
    onSave(); showLoader(false);
  };
}

// ══════════════════════════════════════════════
//  SETTINGS
// ══════════════════════════════════════════════
async function settingsScreen() {
  const mc = document.getElementById('main-content');
  const data = await getCompanyData();

  mc.innerHTML=`
    <div class="section-header"><h2>Configurações</h2><p>Personalize seu sistema</p></div>

    <div class="settings-section">
      <h3>Identidade da Empresa</h3>
      <div class="avatar-upload">
        <div class="avatar-preview" onclick="document.getElementById('s-logo-input').click()">
          ${data.logo?`<img src="${data.logo}" alt="logo">`:'<span>🏪</span>'}
        </div>
        <div><div style="font-weight:600;font-size:.9rem">Logo da Empresa</div>
          <div style="font-size:.78rem;color:var(--text2);margin-top:4px">Toque para alterar</div></div>
      </div>
      <input type="file" id="s-logo-input" accept="image/*" style="display:none" onchange="uploadLogo(event)">
      <div class="form-group"><label>Nome da Empresa</label>
        <input type="text" id="s-name" value="${data.name||''}">
      </div>
      <button class="btn btn-primary btn-full" onclick="saveName()">Salvar Nome</button>
    </div>

    <div class="settings-section">
      <h3>Acesso do Sistema</h3>
      <div class="form-group"><label>Usuário</label>
        <input type="text" id="s-user" value="${data.user||''}">
      </div>
      <div class="form-group"><label>Nova Senha de Acesso</label>
        <input type="password" id="s-pass" placeholder="Deixe em branco para manter">
      </div>
      <button class="btn btn-secondary btn-full" onclick="saveAccess()">Atualizar Acesso</button>
    </div>

    <div class="settings-section">
      <h3>🔐 Senha do Gerente</h3>
      <p style="font-size:.82rem;color:var(--text2);margin-bottom:12px">Protege: lucro, custo, estoque e edição de produtos.</p>
      <div class="form-group"><label>Senha Atual do Gerente</label>
        <input type="password" id="s-mgr-old" placeholder="••••••">
      </div>
      <div class="form-group"><label>Nova Senha do Gerente</label>
        <input type="password" id="s-mgr-new" placeholder="••••••">
      </div>
      <button class="btn btn-warn btn-full" onclick="saveManagerPass()">Alterar Senha do Gerente</button>
    </div>

    <div class="settings-section">
      <h3>Operador do Dia</h3>
      <div class="form-group"><label>Nome do Responsável</label>
        <input type="text" id="s-operator" value="${data.operator||''}" placeholder="Ex: João Silva">
      </div>
      <button class="btn btn-secondary btn-full" onclick="saveOperator()">Definir Operador</button>
    </div>

    <div class="settings-section">
      <h3>⚠️ Zona de Perigo</h3>
      <div style="background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:var(--radius);padding:16px">
        <div style="font-size:.85rem;color:var(--text2);margin-bottom:12px">Apaga <strong style="color:var(--accent3)">todos os dados</strong> do Firebase: clientes, produtos, vendas e configurações. Irreversível.</div>
        <button class="btn btn-danger btn-full" onclick="confirmNuke()">🗑️ Apagar Todos os Dados</button>
      </div>
    </div>
  `;

  window.uploadLogo = (e) => {
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      showLoader(true);
      await saveCompanyData({logo:ev.target.result});
      toast('Logo atualizado!','success');
      const data2=await getCompanyData();
      refreshTopBar(data2);
      settingsScreen();
      showLoader(false);
    };
    reader.readAsDataURL(file);
  };

  window.saveName = async () => {
    const name=document.getElementById('s-name').value.trim();
    if(!name){toast('Informe o nome','error');return;}
    showLoader(true);
    await saveCompanyData({name});
    const data2=await getCompanyData();
    refreshTopBar(data2);
    toast('Nome atualizado!','success');
    showLoader(false);
  };

  window.saveAccess = async () => {
    const user=document.getElementById('s-user').value.trim();
    const pass=document.getElementById('s-pass').value;
    if(!user){toast('Informe o usuário','error');return;}
    showLoader(true);
    const upd={user};
    if(pass) upd.pass=pass;
    await saveCompanyData(upd);
    toast('Acesso atualizado!','success');
    showLoader(false);
  };

  window.saveManagerPass = async () => {
    const oldP=document.getElementById('s-mgr-old').value;
    const newP=document.getElementById('s-mgr-new').value;
    if(!newP){toast('Informe a nova senha','error');return;}
    showLoader(true);
    const d=await getCompanyData();
    if(oldP!==(d.managerPass||'1234')){toast('Senha atual incorreta','error');showLoader(false);return;}
    await saveCompanyData({managerPass:newP});
    toast('Senha do gerente alterada!','success');
    showLoader(false);
  };

  window.saveOperator = async () => {
    const op=document.getElementById('s-operator').value.trim();
    showLoader(true);
    await saveCompanyData({operator:op});
    const d=await getCompanyData();
    refreshTopBar(d);
    toast(op?'Operador definido: '+op:'Operador removido','success');
    showLoader(false);
  };

  window.confirmNuke = () => {
    requireManager(()=>{
      const overlay=document.createElement('div');
      overlay.className='modal-overlay';
      overlay.innerHTML=`
        <div class="modal">
          <h3 style="color:var(--accent3)">⚠️ Apagar Tudo?</h3>
          <p style="font-size:.85rem;color:var(--text2);margin-bottom:16px">Esta ação apaga todos os dados do servidor. Irreversível.</p>
          <div class="form-group"><label>Digite APAGAR para confirmar</label>
            <input type="text" id="nuke-input" placeholder="APAGAR">
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
            <button class="btn btn-danger" onclick="doNuke()">Apagar Tudo</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
    });
  };

  window.doNuke = async () => {
    if(document.getElementById('nuke-input')?.value!=='APAGAR'){toast('Digite APAGAR','error');return;}
    showLoader(true);
    // Delete all subcollections
    const colls=['clients','products','sales'];
    for(const c of colls){
      const snap=await getDocs(companyColl(c));
      await Promise.all(snap.docs.map(d=>deleteDoc(d.ref)));
    }
    await saveCompanyData({name:'Minha Empresa',logo:'',operator:'',managerPass:'1234'});
    localStorage.removeItem('gp_session');
    COMPANY_ID=null;
    SESSION={managerUnlocked:false};
    document.querySelector('.modal-overlay')?.remove();
    document.getElementById('app-shell').classList.add('hidden');
    document.getElementById('screen-login').classList.remove('hidden');
    document.getElementById('login-user').value='';
    document.getElementById('login-pass').value='';
    toast('Dados apagados','error');
    showLoader(false);
  };
}

// ── BOOT ──
boot();

// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
